name: Java CI/CD with Maven

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build Expense Service
      run: mvn -B package --file expense-service/pom.xml -DskipTests

    - name: Build Budget Service
      run: mvn -B package --file budget-service/pom.xml -DskipTests

    - name: Run Tests
      run: |
        mvn test --file expense-service/pom.xml
        mvn test --file budget-service/pom.xml
