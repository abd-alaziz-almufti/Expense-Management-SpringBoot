name: Java CI/CD with Maven

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 23
      uses: actions/setup-java@v4
      with:
        java-version: '23'
        distribution: 'temurin'
        cache: maven

    - name: Make Maven Wrapper Executable
      run: |
        chmod +x expense-service/mvnw
        chmod +x budget-service/mvnw

    - name: Build Expense Service
      run: ./mvnw -B package -DskipTests
      working-directory: ./expense-service

    - name: Build Budget Service
      run: ./mvnw -B package -DskipTests
      working-directory: ./budget-service